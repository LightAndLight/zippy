cradle:
  cabal:
    - path: "zippy/src"
      component: "lib:zippy"

    - path: "zippy/app/Main.hs"
      component: "zippy:exe:zippy"

    - path: "zippy/test"
      component: "zippy:test:zippy-tests"

    - path: "zippy-benchmarks/bench/Main.hs"
      component: "zippy-benchmarks:bench:zippy-benchmarks"

    - path: "zippy-memory/src"
      component: "lib:zippy-memory"

    - path: "zippy-memory/test"
      component: "zippy-memory:test:zippy-memory-tests"

    - path: "zippy-streaming/src"
      component: "lib:zippy-streaming"
